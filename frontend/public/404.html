<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Okan Invoice Generator</title>
    <script>
      // GitHub Pages serves this file for any unknown path.
      // We encode the path as a query param and redirect to index.html,
      // which then restores it via history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
